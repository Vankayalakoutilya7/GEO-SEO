<!doctype html>
<html lang="it" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GEO-SEO CRM{% endblock %}</title>

  <!-- Bootstrap 5 dark -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0a0c10;
      --card-bg: rgba(22, 27, 34, 0.7);
      --card-border: rgba(48, 54, 61, 0.5);
      --text-main: #e6edf3;
      --text-muted: #8b949e;
      
      --accent-primary: #7c4dff;
      --accent-secondary: #e94560;
      
      --geo-good: #2ecc71;
      --geo-moderate: #3498db;
      --geo-poor: #f1c40f;
      --geo-critical: #e74c3c;
      
      --glass-blur: blur(12px);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body { 
      background: var(--bg-dark); 
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(124, 77, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(233, 69, 96, 0.05) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      letter-spacing: -0.011em;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* Navbar styling */
    .navbar { 
      background: rgba(10, 12, 16, 0.8) !important;
      backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .navbar-brand { 
      font-weight: 800; 
      letter-spacing: -0.02em;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .navbar-brand span { 
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* KPI cards with glassmorphism */
    .kpi-card { 
      background: var(--card-bg); 
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border); 
      border-radius: 16px; 
      padding: 1.5rem; 
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    .kpi-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-primary);
      box-shadow: 0 10px 30px rgba(124, 77, 255, 0.15);
    }
    .kpi-value { font-size: 2.2rem; font-weight: 800; line-height: 1; margin-bottom: 0.5rem; letter-spacing: -0.03em; }
    .kpi-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Modern Progress Bars */
    .score-bar-wrap { display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 200px; }
    .score-bar { height: 10px; border-radius: 20px; background: rgba(48, 54, 61, 0.6); flex: 1; overflow: hidden; position: relative; }
    .score-bar-fill { height: 100%; border-radius: 20px; transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
    .score-num { font-size: 0.85rem; font-weight: 700; min-width: 45px; }

    .tier-good     .score-bar-fill { background: linear-gradient(90deg, #2ecc71, #27ae60); }
    .tier-good     .score-num      { color: var(--geo-good); }
    .tier-moderate .score-bar-fill { background: linear-gradient(90deg, #3498db, #2980b9); }
    .tier-moderate .score-num      { color: var(--geo-moderate); }
    .tier-poor     .score-bar-fill { background: linear-gradient(90deg, #f1c40f, #f39c12); }
    .tier-poor     .score-num      { color: var(--geo-poor); }
    .tier-critical .score-bar-fill { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .tier-critical .score-num      { color: var(--geo-critical); }

    /* Score Circle */
    .score-circle { 
      width: 120px; height: 120px; border-radius: 60px; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      border: 6px solid; font-weight: 800;
      background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%);
      transition: var(--transition);
    }
    .score-circle .big { font-size: 2.5rem; line-height: 1; letter-spacing: -0.05em; }
    .score-circle .sub { font-size: 0.8rem; opacity: 0.7; }
    
    .score-circle.tier-good     { border-color: var(--geo-good); color: var(--geo-good); box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
    .score-circle.tier-moderate { border-color: var(--geo-moderate); color: var(--geo-moderate); box-shadow: 0 0 20px rgba(52, 152, 219, 0.2); }
    .score-circle.tier-poor     { border-color: var(--geo-poor); color: var(--geo-poor); box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
    .score-circle.tier-critical { border-color: var(--geo-critical); color: var(--geo-critical); box-shadow: 0 0 20px rgba(231, 76, 60, 0.2); }

    /* Refined Table */
    .table-container { 
      background: var(--card-bg); 
      border: 1px solid var(--card-border); 
      border-radius: 16px; 
      overflow: hidden;
      margin-top: 1rem;
    }
    .table { margin-bottom: 0; --bs-table-bg: transparent; }
    .table thead th { 
      background: rgba(22, 27, 34, 0.9); 
      color: var(--text-muted); 
      font-size: 0.75rem; 
      font-weight: 700;
      text-transform: uppercase; 
      letter-spacing: 0.08em; 
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 1.5rem;
    }
    .table tbody tr { border-bottom: 1px solid var(--card-border); transition: var(--transition); }
    .table tbody tr:last-child { border-bottom: none; }
    .table tbody tr:hover { background: rgba(124, 77, 255, 0.05); cursor: pointer; }
    .table td { padding: 1.2rem 1.5rem; vertical-align: middle; }

    /* Custom Buttons */
    .btn { border-radius: 10px; font-weight: 600; padding: 0.5rem 1.2rem; transition: var(--transition); }
    .btn-primary { 
      background: linear-gradient(135deg, var(--accent-primary) 0%, #6e3eff 100%); 
      border: none;
      box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124, 77, 255, 0.4); }

    /* Badges */
    .badge { padding: 0.5em 0.8em; border-radius: 6px; font-weight: 600; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center gap-4">
      <a class="navbar-brand" href="/">GEO<span>-SEO</span> ANALYZER</a>
      <div class="d-none d-md-flex align-items-center gap-3">
        <a href="/" class="text-muted text-decoration-none small fw-bold hover-white">HOME</a>
        <a href="/settings" class="text-muted text-decoration-none small fw-bold hover-white {% if not claude_api_key_set %}text-warning{% endif %}">
          SETUP CLAUDE {% if not claude_api_key_set %}<i class="bi bi-exclamation-triangle ms-1"></i>{% endif %}
        </a>
      </div>
    </div>
    <div class="d-flex align-items-center gap-3">
      {% if claude_api_key_set %}
      <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 small px-3">
        <i class="bi bi-robot me-1"></i> AI READY
      </span>
      {% else %}
      <a href="/settings" class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 small px-3 text-decoration-none">
        <i class="bi bi-robot me-1"></i> KEY MISSING
      </a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
